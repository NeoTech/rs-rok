# Run the rs-rok Worker locally via workerd in a container.
#
# Usage:
#   docker compose -f worker/docker-compose.yml up --build
#
# The Worker will be available at http://localhost:8787
# Point the CLI at it:
#   rs-rok config set-endpoint http://localhost:8787
#
# To enable auth token enforcement, set AUTH_TOKEN in a .env file:
#   echo 'AUTH_TOKEN=mysecret' > worker/.env
# or pass it directly:
#   AUTH_TOKEN=mysecret docker compose -f worker/docker-compose.yml up --build

services:
  workerd:
    build:
      context: .
      dockerfile: Dockerfile.workerd
    ports:
      - "8787:8787"
    volumes:
      - do-data:/worker/do-data
    environment:
      - AUTH_TOKEN=${AUTH_TOKEN:-}
    restart: unless-stopped

volumes:
  do-data:
